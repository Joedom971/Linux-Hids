#!/bin/bash
# ============================================================================
# thresholds.conf — Configurable alert thresholds
# ============================================================================
# Nice-to-have from the brief: "Configurable thresholds via a config file,
# so the tool adapts to different environments without editing the script."
# Change values here, not in the module code.
# ============================================================================

# --- System Health (Module 1) ---

# Disk usage thresholds (in %)
# WARNING at 80%, CRITICAL at 90%
DISK_WARN_PERCENT=80
DISK_CRIT_PERCENT=90

# Memory: available memory percentage thresholds
# WARNING when available drops below 20%, CRITICAL below 5%
MEM_WARN_PERCENT=20
MEM_CRIT_PERCENT=5

# Swap usage threshold (in KB)
# CRITICAL when swap usage exceeds 500MB — combined with low memory = real problem
SWAP_CRIT_KB=512000

# Process count: percentage ABOVE baseline that triggers an alert
# WARNING at +50% above baseline, CRITICAL at +100% (double the normal count)
# Detects fork bombs, malware spawning, or runaway processes
PROCESS_WARN_PERCENT=50
PROCESS_CRIT_PERCENT=100

# System error logs: count in the last 20 journal entries
# Defaults tuned for a desktop/workstation — bluetooth, wifi, udev can
# each emit several benign "error"-level lines per cycle on a normal
# system. If you're on a silent server, lower these back to 5/15.
ERROR_LOG_WARN_COUNT=30
ERROR_LOG_CRIT_COUNT=60

# Failed systemd services: any failed service = CRITICAL
FAILED_SERVICES_CRIT=1

# Recent reboot detection (in seconds)
# If uptime is less than 300s (5 min), flag as WARNING — unexpected reboots are suspicious
RECENT_REBOOT_SECONDS=300

# --- User Activity (Module 2) ---

# Failed login attempts — above this count = WARNING (possible brute force)
MAX_FAILED_LOGINS=5

# Abnormal sudo-command frequency — above this count in the last 50 lines
MAX_SUDO_COMMANDS=10

# su invocations — above this count in the last 100 lines = WARNING
# su bypasses normal sudo logging; repeated use is a red flag.
MAX_SU_COMMANDS=3
