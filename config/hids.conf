#!/bin/bash
# ============================================================================
# hids.conf — Global HIDS configuration
# ============================================================================
# Sourced by main.sh and controller.sh.
# Defines paths, run interval, and output format.
# To adapt the HIDS to another machine, change values here — not in the code.
# ============================================================================

# Interval between each monitoring cycle (in seconds)
# 60 = the controller re-runs all modules every minute
RUN_INTERVAL=60

# Hostname — included in every JSON alert to identify the host
HOSTNAME=$(hostname)

# Directory for logs (alerts.json + raw_events.log)
# Uses $HIDS_DIR (exported by main.sh/controller.sh) for portability
LOG_DIR="$HIDS_DIR/logs"

# Directory for baselines (reference state from first run)
BASELINE_DIR="$HIDS_DIR/baselines"

# Alert output format — "json" = parsable by a SIEM (Splunk, ELK, Wazuh)
ALERT_FORMAT="json"

# --- Alert deduplication ---
# An alert with the same (severity, module, message) will be silenced
# for this many seconds after its first appearance. Prevents the console
# from spamming the same warning every 60s cycle.
# Set to 0 to disable dedup entirely.
ALERT_DEDUP_SECONDS=1800

# Max entries kept in the dedup state file. Oldest are pruned on write.
ALERT_DEDUP_MAX_ENTRIES=500
