#!/bin/bash
# ============================================================================
# user_activity.conf — User activity detection tunables
# ============================================================================
# Tune these values to match the environment. The design principle is a
# narrow whitelist: on a controlled host, only a few users, IPs, hours, and
# shells should be considered normal. Anything else is a signal.
# ============================================================================

# --- Allowed login hours (24h clock) ---
# Logins accepted between START (inclusive) and END (exclusive) are normal.
# Outside this window → WARNING.
# Set START=0 END=24 to disable this check.
ALLOWED_LOGIN_HOURS_START=7
ALLOWED_LOGIN_HOURS_END=21

# --- Allowed source IPs / prefixes ---
# Space-separated list. Matched by string prefix against the remote IP
# parsed from auth.log ("Accepted ... from X.X.X.X").
# NOTE: prefix-string matching, NOT CIDR. Use "192.168." to whitelist
# 192.168.0.0/16, "10." for 10.0.0.0/8, or a full IP for a single host.
# Leave empty to disable (no IP is ever flagged).
ALLOWED_IPS="127. 192.168. 10. ::1"

# --- Service accounts that must NEVER spawn an interactive shell ---
# If one of these UIDs is found running bash/sh/zsh/dash → CRITICAL.
# Classic webshell indicator (PHP/nginx RCE dropping a bash child).
SERVICE_ACCOUNTS="www-data nginx apache httpd mysql postgres redis mongodb \
  ftp nobody daemon bin sys games mail news uucp proxy list irc gnats"

# Shells we consider "interactive" when spawned by a service account
INTERACTIVE_SHELLS="bash sh zsh dash ksh tcsh csh ash fish"

# --- Session limits ---
# Max concurrent sessions per user before WARNING
MAX_CONCURRENT_SESSIONS=2

# Idle session duration (in hours) before INFO alert
IDLE_SESSION_WARN_HOURS=24

# --- Brute force success window ---
# Number of recent auth.log lines inspected for fail→success correlation
BRUTE_FORCE_WINDOW_LINES=500

# Min failures from same IP before a subsequent success is suspicious
BRUTE_FORCE_MIN_FAILS=5

# --- Connection burst ---
# Max connections from a single IP within the recent window before WARNING
CONN_BURST_MAX=20
CONN_BURST_WINDOW_LINES=200

# --- Expected user shells ---
# Any user whose shell is NOT in this list is flagged (common backdoor
# technique: setting /bin/bash for a "service" account, or /sbin/nologin
# silently replaced with a real shell).
# Shells in /etc/shells are considered legitimate.
EXPECTED_SHELLS="/bin/bash /bin/sh /bin/zsh /bin/dash /bin/rbash \
  /usr/bin/bash /usr/bin/zsh /usr/bin/fish \
  /sbin/nologin /usr/sbin/nologin /bin/false /usr/bin/false \
  /bin/sync /usr/sbin/shutdown /usr/sbin/halt"

# ============================================================================
# Process/Network tunables (consumed by modules/process_network.sh)
# ============================================================================

# --- Scripting interpreters that should NOT open outbound sockets ---
# A python/perl/php child of a web server reaching out on the network is
# the canonical webshell → C2 signal.
INTERPRETERS="python python2 python3 perl php ruby node lua tclsh awk"

# --- Unusual filesystem locations for an executable ---
# An exe resolving under any of these prefixes is suspicious.
# /tmp, /dev/shm, /var/tmp are handled by the legacy block (1).
SUSPICIOUS_PATH_PREFIXES="/var/spool /var/lock /var/cache/apt/archives/partial \
  /.hidden /root/.cache /root/.config"

# --- Resource thresholds (snapshot-based; no cross-cycle state) ---
CPU_WARN_PERCENT=80
MEM_WARN_PERCENT=50
THREAD_WARN_COUNT=500

# --- Long-lived external connections ---
# An ESTABLISHED outbound connection backed by a process whose uptime
# exceeds this value hints at a persistent reverse shell / C2 tunnel.
LONG_CONN_WARN_HOURS=6

# --- C2 beaconing heuristic ---
# Same external IP seen in an ESTABLISHED outbound connection for this
# many consecutive monitoring cycles → candidate beacon.
BEACON_MIN_CYCLES=3

# --- JIT runtimes allowed to have RWX memory pages ---
# Legitimate JIT compilers map RWX pages. Do NOT alert on these.
JIT_RUNTIMES="java node chrome chromium firefox mono dotnet v8 julia"

# --- Restart-loop heuristic ---
# If the same exe basename is running in MORE than this many processes,
# flag as a potential restart/fork loop (cryptominer, malware spawns).
# Web servers legitimately spawn many children (apache prefork), so tune.
RESTART_LOOP_MAX=20
