#!/bin/bash
# ============================================================================
# auditd.conf — Auditd parser configuration
# ============================================================================
# auditd is the Linux kernel audit framework. It records syscalls such as
# command executions, file access, permission changes, etc.
# Our auditd_parser.sh module reads this log and extracts useful events.
# ============================================================================

# Path to the kernel audit log
AUDIT_LOG="/var/log/audit/audit.log"

# Enable/disable auditd parsing (set to false if auditd is not installed)
ENABLE_AUDITD=true
