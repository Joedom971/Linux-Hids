#!/bin/bash
# ============================================================================
# file_integrity.conf — Critical files to monitor
# ============================================================================
# BUG FIXED: this file was a copy of hids.conf.
# It was missing the CRITICAL_FILES[] array that file_integrity.sh and
# baseline.sh iterate over. Without this array, both scripts silently failed.
# ============================================================================

# Critical system files — any unexpected change triggers a CRITICAL alert
# We monitor:
#   - /etc/passwd, /etc/shadow, /etc/group : user accounts and passwords
#   - /etc/sudoers : who has root privileges
#   - /etc/ssh/sshd_config : SSH config (attacker could enable PermitRootLogin)
#   - /etc/crontab : scheduled tasks (classic persistence technique)
#   - /etc/hosts : local DNS redirection (man-in-the-middle attack)
#   - /etc/resolv.conf : DNS servers (attacker can redirect traffic)

CRITICAL_FILES=(
  "/etc/passwd"
  "/etc/shadow"
  "/etc/group"
  "/etc/sudoers"
  "/etc/ssh/sshd_config"
  "/etc/crontab"
  "/etc/hosts"
  "/etc/resolv.conf"
)
